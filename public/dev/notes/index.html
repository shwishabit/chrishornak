<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>The Daily Now</title>

<base href="./">
<script>
  // Vercel strips trailing slashes (/dev/notes/ -> /dev/notes), which would
  // make relative paths resolve against /dev/ and 404. Force base to the
  // current "directory" so styles/scripts/fetch resolve under /dev/notes/.
  // Works locally too: pathname "/" stays "/".
  if (!location.pathname.endsWith("/")) {
    document.querySelector("base").setAttribute("href", location.pathname + "/");
  }
</script>

<meta name="theme-color" content="#F4EDE0"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Daily Now"/>
<meta name="mobile-web-app-capable" content="yes"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;1,8..60,300;1,8..60,400;1,8..60,500&display=swap" rel="stylesheet"/>

<link rel="stylesheet" href="styles.css?v=18"/>
</head>
<body>
<!--
  Boot config — read once by app.jsx at module top:
    data-namespace : localStorage prefix ("dn" = real user; "dn-test" = sandbox)
    data-admin     : "true" shows the admin trigger dot; "false" hides it
    data-seed      : "true" pre-populates demo journal entries on empty boot

  This file is the canonical source; copies live at chrishornak/site/public/dev/<n>/.
  /dev/notes uses dn / false / false. /dev/notes-test will use dn-test / true / true.
-->
<div id="root" data-namespace="dn" data-admin="false" data-seed="false"></div>

<script type="text/babel" src="tweaks-panel.jsx?v=18"></script>

<script type="text/babel" src="app.jsx?v=18"></script>
</body>
